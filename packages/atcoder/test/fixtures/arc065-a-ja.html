<!doctype html>
<html lang="ja">
  <head><title>C - 白昼夢 - AtCoder Regular Contest 065</title></head>
  <body>
    <div id="main-div">
      <span class="h2">C - 白昼夢</span>
      <p>実行時間制限: 2 sec / メモリ制限: 256 MiB</p>
      <span class="lang-ja">
        <section>
          <h3>問題文</h3>
          <p>文字列 <var>S</var> が与えられます。<code>dream</code> などを連結して作れるか判定してください。</p>
        </section>
        <section>
          <h3>制約</h3>
          <p>\(1 \le |S| \le 10^5\)<br><var>S</var> は英小文字からなる。</p>
        </section>
        <section>
          <h3>入力</h3>
          <pre>S
</pre>
        </section>
        <section>
          <h3>出力</h3>
          <p>作れる場合は <code>YES</code>、そうでなければ <code>NO</code> と出力せよ。</p>
        </section>
        <section>
          <h3>入力例 1</h3>
          <pre>erasedream
</pre>
        </section>
        <section>
          <h3>出力例 1</h3>
          <pre>YES
</pre>
        </section>
        <section>
          <h3>入力例 2</h3>
          <pre>dreamerer
</pre>
        </section>
        <section>
          <h3>出力例 2</h3>
          <pre>NO
</pre>
          <p>条件を満たす分割は存在しない。</p>
        </section>
      </span>
    </div>
  </body>
</html>
