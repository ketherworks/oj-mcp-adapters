<!doctype html>
<html lang="zh-CN">
  <head><title>静态特征查询</title></head>
  <body>
    <div class="question-intr mb2 mt2">
      <div class="subject-item-wrap">
        <span>题号：NC218144</span><br>
        <span>时间限制：C/C++/Rust/Pascal 3秒，其他语言6秒</span><br>
        <span>空间限制：C/C++/Rust/Pascal 256 M，其他语言512 M</span><br>
        <span>难度：1500</span>
      </div>
    </div>

    <h2 class="subject-item-title">题目描述</h2>
    <div class="subject-describe">
      <div class="subject-question">
        牛妹需要处理 <img src="https://www.nowcoder.com/equation?tex=n"> 次查询。<br>
        若缓存不存在，则记录机器与文章的组合。
      </div>

      <h2>输入描述:</h2>
      <pre>第一行输入整数 <img src="https://www.nowcoder.com/equation?tex=n">，满足 <img src="https://www.nowcoder.com/equation?tex=1%5Cle%20n%5Cle%2010%5E5">。
接下来 n 行，每行两个仅含大写字母的字符串，长度不超过 10。</pre>

      <h2>输出描述:</h2>
      <pre>每次查询输出 YES 或 NO。</pre>

      <div class="question-tags">
        <a class="tag-label" href="/acm/problem/list?tagId=hash">哈希</a>
        <a class="tag-label" href="/acm/problem/list?tagId=simulation">模拟</a>
      </div>

      <div class="question-oi">
        <div class="question-oi-hd">示例1</div>
        <div class="question-oi-bd">
          <div class="question-oi-mod">
            <h2>输入</h2>
            <textarea>3
A X
A X
B Y</textarea>
          </div>
          <div class="question-oi-mod">
            <h2>输出</h2>
            <textarea>YES
NO
YES</textarea>
          </div>
          <div class="question-oi-mod">
            <h2>说明</h2>
            <div class="question-oi-cont"><pre>第二次查询命中缓存。</pre></div>
          </div>
        </div>
      </div>

      <div class="question-oi">
        <div class="question-oi-hd">示例2</div>
        <div class="question-oi-bd">
          <div class="question-oi-mod">
            <h2>输入</h2>
            <div class="question-oi-cont"><pre>1
C Z</pre></div>
          </div>
          <div class="question-oi-mod">
            <h2>输出</h2>
            <div class="question-oi-cont"><pre>YES</pre></div>
          </div>
        </div>
      </div>

      <h2>备注:</h2>
      <pre>请使用标准输入输出。</pre>
    </div>

    <div class="topic-popup">
      <div class="terminal-topic-title"><i class="icon-list"></i>静态特征查询</div>
    </div>

  </body>
