name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:pack --workspace @kaiserunix/codeforces-mcp-server
      - run: npm run pack:check --workspace @kaiserunix/nowcoder-mcp-server
      - run: npm pack --dry-run --workspace @kaiserunix/atcoder-mcp-server
      - run: npm pack --dry-run --workspace @kaiserunix/luogu-mcp-server
      - run: npm run deploy:cf:dry-run --workspace @kaiserunix/codeforces-mcp-server
      - run: npx wrangler deploy --dry-run --config packages/atcoder/wrangler.jsonc
      - run: npx wrangler deploy --dry-run --config packages/luogu/wrangler.jsonc
      - run: npm audit --omit=dev --audit-level=high
